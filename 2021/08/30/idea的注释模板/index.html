        <h6 id="类注释模板"><a href="#类注释模板" class="headerlink" title="类注释模板"></a>类注释模板</h6><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment"> * 简述功能</span></span><br><span class="line"><span class="comment"> *</span></span><br><span class="line"><span class="comment"> * <span class="doctag">@author</span> $user$</span></span><br><span class="line"><span class="comment"> * <span class="doctag">@since</span> 1.0.0_$date$</span></span><br><span class="line"><span class="comment"> */</span></span><br></pre></td></tr></table></figure>

<h6 id="方法注释模板"><a href="#方法注释模板" class="headerlink" title="方法注释模板"></a>方法注释模板</h6><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">*</span><br><span class="line"> * 简述功能</span><br><span class="line"> * $param$$<span class="keyword">return</span>$</span><br><span class="line"> * <span class="meta">@author</span> $user$</span><br><span class="line"> * <span class="meta">@since</span> <span class="number">1.0</span>.0_$date$</span><br><span class="line"> */</span><br></pre></td></tr></table></figure>

<ol>
<li><p>date的default value</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">date(&quot;yyyy年MM月dd日&quot;)</span><br></pre></td></tr></table></figure></li>
<li><p>param的default value</p>
<figure class="highlight groovy"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">groovyScript(<span class="string">&quot;def result = &#x27;&#x27;;def params = \&quot;$&#123;_1&#125;\&quot;.replaceAll(&#x27;[\\\\[|\\\\]|\\\\s]&#x27;, &#x27;&#x27;).split(&#x27;,&#x27;).toList(); for(i = 0; i &lt; params.size(); i++) &#123;if(params[i] != &#x27;&#x27;)result+=&#x27;* @param &#x27; + params[i] + ((i &lt; params.size() - 1) ? &#x27;\\r\\n &#x27; : &#x27;&#x27;)&#125;; return result == &#x27;&#x27; ? null : &#x27;\\r\\n &#x27; + result&quot;</span>, methodParameters())</span><br></pre></td></tr></table></figure></li>
<li><p>return的default value</p>
<figure class="highlight groovy"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">groovyScript(<span class="string">&quot;return \&quot;$&#123;_1&#125;\&quot; == &#x27;void&#x27; ? null : &#x27;\\r\\n * @return &#x27; + \&quot;$&#123;_1&#125;\&quot;&quot;</span>, methodReturnType())</span><br></pre></td></tr></table></figure></li>
<li><p>名称必须设置成 *</p>
</li>
</ol>
